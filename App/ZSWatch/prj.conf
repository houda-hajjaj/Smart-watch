CONFIG_LOG=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_EVENTS=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_DISPLAY=y
CONFIG_INPUT=y
CONFIG_INPUT_TSC2007=y
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_MEM_POOL_SIZE=65536
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_FULL_REFRESH=n
CONFIG_LV_Z_DOUBLE_VDB=n
CONFIG_LV_Z_VDB_SIZE=20
CONFIG_LV_Z_POINTER_INPUT=y
CONFIG_LV_USE_LOG=n

# Sensor triggers
CONFIG_HTS221_TRIGGER_NONE=y
CONFIG_LPS22HH_TRIGGER_OWN_THREAD=y
CONFIG_STTS751_TRIGGER_NONE=y
CONFIG_LIS2MDL_TRIGGER_NONE=y
CONFIG_LIS2DW12_TRIGGER_OWN_THREAD=y
CONFIG_LSM6DSO_ENABLE_TEMP=n
CONFIG_LSM6DSO_TRIGGER_OWN_THREAD=y

# RTC
CONFIG_RTC=y

# Hardware timers (Counter API) – timer0 (sleep 30s) + timer1 (sample 100ms)
CONFIG_COUNTER=y

# Augumenter size if draw too much on screen
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── BLE ──────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Smart Watch Timer_X"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# GATT services
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF="Smart Watch Timer_X"
CONFIG_BT_DIS_MODEL="IKS01A3-nRF5340-adafruit_2_8_tft_touch_shield_v2"
CONFIG_BT_BAS=y
CONFIG_BT_GATT_CLIENT=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=2048

# Fusion de capteurs (zscilib)
CONFIG_ZSL=y
